.check_pre_commit_template:
  stage: check
  image: $ESP_DOCS_ENV_IMAGE
  extends:
    - .before_script_minimal
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - pip install pre-commit
    # Fetch target branch latest commit
    - git fetch origin $CI_MERGE_REQUEST_TARGET_BRANCH_NAME --depth=1
    # Fetch source branch latest commit
    - git fetch origin $CI_COMMIT_REF_NAME --depth=1

    - |
      echo "Target branch: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
      echo "Source branch: $CI_COMMIT_REF_NAME"

      MODIFIED_FILES=$(git diff --name-only origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME..origin/$CI_COMMIT_REF_NAME)
      COMMITS_TO_CHECK=$(git rev-list --reverse origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME..origin/$CI_COMMIT_REF_NAME)
      echo "Modified files to check:"
      echo "$MODIFIED_FILES"

      if [ -n "$MODIFIED_FILES" ]; then
          CI=true pre-commit run --files $MODIFIED_FILES
      else
          echo "No modified files to check."
      fi

      if [ -n "$COMMITS_TO_CHECK" ]; then
          CHECK_STATUS=0
          echo "Commit messages to check:"
          echo "$COMMITS_TO_CHECK"

          for COMMIT_SHA in $COMMITS_TO_CHECK; do
              COMMIT_MSG_FILE=$(mktemp)
              git log -1 --format=%B "$COMMIT_SHA" > "$COMMIT_MSG_FILE"

              echo "Checking commit message for $COMMIT_SHA"
              if ! CI=true pre-commit run conventional-precommit-linter --hook-stage commit-msg --commit-msg-filename "$COMMIT_MSG_FILE"; then
                  CHECK_STATUS=1
              fi

              rm -f "$COMMIT_MSG_FILE"
          done

          if [ "$CHECK_STATUS" -ne 0 ]; then
              exit "$CHECK_STATUS"
          fi
      else
          echo "No commit messages to check."
      fi


check_pre_commit:
  extends:
    - .check_pre_commit_template


check_setup:
  stage: check
  image: $ESP_DOCS_ENV_IMAGE
  extends:
    - .before_script_minimal
  script:
    - pip install .


check_python_style:
  stage: check
  image: $ESP_DOCS_ENV_IMAGE
  extends:
    - .before_script_minimal
  script:
    - pip install flake8
    - python -m flake8 --config=$ESP_DOCS_PATH/.flake8 $ESP_DOCS_PATH
